version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ges_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123nanayaw
      POSTGRES_DB: ges_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - ges_network

  backend:
    build: .
    container_name: ges_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ges_db
      DB_USER: postgres
      DB_PASSWORD: 123nanayaw
      JWT_SECRET: ges_super_secret_jwt_key_2026
      JWT_EXPIRES_IN: 7d
    volumes:
      - uploads_data:/app/src/uploads
    depends_on:
      - postgres
    networks:
      - ges_network

  ges-teacher:
    build:
      context: ../finalyear/ges-teacher
    container_name: ges_teacher
    restart: always
    ports:
      - "5173:80"
    networks:
      - ges_network

  ges-hr-admin:
    build:
      context: ../finalyear/ges-hr-admin
    container_name: ges_hr_admin
    restart: always
    ports:
      - "5174:80"
    networks:
      - ges_network

networks:
  ges_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data: